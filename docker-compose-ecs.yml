services:
  fastapi-app:
    build:
      context: ./transfermarkt-api
      dockerfile: Dockerfile
    container_name: fastapi-container
    ports:
      - "9000:9000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
    env_file:
      - ./transfermarkt-api/.env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: awslogs
      options:
        awslogs-group: /ecs/fastapi-app
        awslogs-region: eu-west-3
        awslogs-stream-prefix: ecs

  redis:
    image: "redis:7-alpine"
    container_name: redis-container
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

volumes:
  redis-data:
