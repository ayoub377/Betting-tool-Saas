<nav class="bg-gradient-to-r from-gray-900 to-indigo-900 shadow-lg fixed top-0 left-0 w-full z-50">

    <a href="/" aria-label="Go to homepage">
      <img src="assets/logo-saas.jpg" alt="Sharper Bets logo" class="w-18 h-16">

    <div class="hidden md:flex items-center space-x-8">

      <div class="relative group">
        <button (click)="scrollToServices()" class="nav-link hover:text-gray-300">Services</button>
        <div *ngIf="isDesktopDropdownOpen"
          class="absolute left-0 mt-2 w-48 bg-white text-black rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition duration-300">
          <a href="/real-time-odds" class="dropdown-item">Real-Time Odds</a>

      </div>

    <app-auth-button class="hidden md:block text-white font-medium"></app-auth-button>

    <button class="md:hidden text-white focus:outline-none" (click)="toggleResponsive()">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
