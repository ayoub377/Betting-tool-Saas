services:
  fastapi-app:
    build:
      context: ./transfermarkt-api
      dockerfile: Dockerfile
    container_name: fastapi-dev
    ports:
      - "9000:9000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/betting_analysis}

    env_file:
      - ./transfermarkt-api/.env
    volumes:
      - ./transfermarkt-api:/app
    restart: no

  redis:
    image: "redis:7-alpine"
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  postgres:
    image: "postgres:16-alpine"
    container_name: postgres-container
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-betting_analysis}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-dev-data:
  postgres-data:
